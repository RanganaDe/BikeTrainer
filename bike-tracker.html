<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadence Log — Ride Tracker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
	<style>
		:root {
			--bg: #14171a;
			--surface: #1b1f23;
			--surface-2: #22272c;
			--border: #2c3237;
			--text: #ecedef;
			--text-muted: #7c848c;
			--power: #f4c430;
			--power-dim: #5a4d1c;
			--speed: #4dc8ff;
			--speed-dim: #204a5c;
			--danger: #e5533d;
			--radius: 14px;
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			padding: 0;
		}

		body {
			background: radial-gradient(1200px 600px at 20% -10%, rgba(244, 196, 48, 0.05), transparent),
			radial-gradient(1000px 500px at 100% 0%, rgba(77, 200, 255, 0.05), transparent),
			var(--bg);
			color: var(--text);
			font-family: 'Space Grotesk', sans-serif;
			min-height: 100vh;
			padding: 24px 16px 64px;
		}

		.wrap {
			max-width: 640px;
			margin: 0 auto;
		}

		.account-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 14px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			margin-bottom: 14px;
		}

		.account-info {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.account-avatar {
			width: 26px;
			height: 26px;
			border-radius: 50%;
			background: var(--surface-2);
			background-size: cover;
			background-position: center;
			border: 1px solid var(--border);
			flex-shrink: 0;
		}

		.account-avatar.has-photo {
			border-color: var(--power);
		}

		.account-name {
			font-family: 'Space Grotesk', sans-serif;
			font-size: 13px;
			color: var(--text-muted);
		}

		.account-name.signed-in {
			color: var(--text);
		}

		#authBtn {
			font-size: 13px;
			padding: 8px 14px;
		}

		#authBtn.signed-in {
			background: var(--surface-2);
			color: var(--text-muted);
		}

		.sync-note {
			font-family: 'JetBrains Mono', monospace;
			font-size: 11px;
			color: var(--text-muted);
			margin-top: 6px;
		}

		header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 28px;
			gap: 12px;
		}

		.brand {
			display: flex;
			align-items: center;
			gap: 10px;
			font-family: 'JetBrains Mono', monospace;
			font-size: 13px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: var(--text-muted);
		}

		.dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: var(--text-muted);
			flex-shrink: 0;
		}

		.dot.live {
			background: var(--power);
			box-shadow: 0 0 0 0 rgba(244, 196, 48, 0.6);
			animation: pulse 1.8s infinite;
		}

		@keyframes pulse {
			0% {
				box-shadow: 0 0 0 0 rgba(244, 196, 48, 0.45);
			}
			70% {
				box-shadow: 0 0 0 8px rgba(244, 196, 48, 0);
			}
			100% {
				box-shadow: 0 0 0 0 rgba(244, 196, 48, 0);
			}
		}

		@media (prefers-reduced-motion: reduce) {
			.dot.live {
				animation: none;
			}
		}

		.actions {
			display: flex;
			gap: 8px;
			align-items: center;
		}

		button {
			font-family: 'Space Grotesk', sans-serif;
			font-weight: 600;
			font-size: 14px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: var(--surface-2);
			color: var(--text);
			padding: 10px 16px;
			cursor: pointer;
			transition: border-color .15s, transform .1s, background .15s;
		}

		button:hover {
			border-color: #3a4149;
		}

		button:active {
			transform: translateY(1px);
		}

		button:focus-visible {
			outline: 2px solid var(--speed);
			outline-offset: 2px;
		}

		button.primary {
			background: var(--power);
			color: #1a1300;
			border-color: var(--power);
		}

		button.primary:hover {
			background: #ffd453;
		}

		button.stop {
			background: var(--danger);
			color: #2a0a05;
			border-color: var(--danger);
		}

		button.icon {
			padding: 10px;
			width: 38px;
			height: 38px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
		}

		button:disabled {
			opacity: .4;
			cursor: not-allowed;
		}

		.banner {
			display: none;
			background: var(--surface-2);
			border: 1px solid var(--border);
			border-left: 3px solid var(--danger);
			border-radius: 10px;
			padding: 12px 14px;
			font-size: 13px;
			color: var(--text-muted);
			margin-bottom: 20px;
			line-height: 1.5;
		}

		.banner.show {
			display: block;
		}

		.banner a {
			color: var(--speed);
			text-decoration: underline;
		}

		.banner a:hover {
			color: var(--power);
		}

		.readouts {
			display: grid;
			grid-template-columns:1fr 1fr;
			gap: 14px;
			margin-bottom: 18px;
		}

		.card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 22px 16px 18px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			position: relative;
			min-height: 180px;
		}

		.ring-wrap {
			position: relative;
			width: 150px;
			height: 150px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.ring-wrap svg {
			position: absolute;
			top: 0;
			left: 0;
			transform: rotate(-90deg);
		}

		.ring-bg {
			fill: none;
			stroke: var(--power-dim);
			stroke-width: 6;
		}

		.ring-fg {
			fill: none;
			stroke: var(--power);
			stroke-width: 6;
			stroke-linecap: round;
			stroke-dasharray: 408;
			stroke-dashoffset: 408;
			transition: stroke-dashoffset .4s ease;
			filter: drop-shadow(0 0 6px rgba(244, 196, 48, .5));
		}

		.value {
			font-family: 'JetBrains Mono', monospace;
			font-weight: 700;
			font-size: 42px;
			font-variant-numeric: tabular-nums;
			line-height: 1;
		}

		.value.power {
			color: var(--power);
		}

		.value.speed {
			color: var(--speed);
			font-size: 48px;
		}

		.unit {
			font-family: 'JetBrains Mono', monospace;
			font-size: 11px;
			letter-spacing: .16em;
			color: var(--text-muted);
			margin-top: 6px;
			text-transform: uppercase;
		}

		.speed-card .value.speed {
			margin-top: 0;
		}

		.stats-grid {
			display: grid;
			grid-template-columns:repeat(5, 1fr);
			gap: 10px;
			margin-bottom: 18px;
		}

		.stat-tile {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 8px;
			text-align: center;
		}

		.stat-value {
			font-family: 'JetBrains Mono', monospace;
			font-weight: 700;
			font-size: 17px;
			font-variant-numeric: tabular-nums;
			color: var(--text);
		}

		.stat-label {
			font-family: 'JetBrains Mono', monospace;
			font-size: 9px;
			letter-spacing: .1em;
			text-transform: uppercase;
			color: var(--text-muted);
			margin-top: 4px;
		}

		@media (max-width: 520px) {
			.stats-grid {
				grid-template-columns:repeat(3, 1fr);
			}
		}

		.route-section {
			margin-bottom: 32px;
		}

		.follow-toggle {
			display: flex;
			align-items: center;
			gap: 6px;
			font-family: 'JetBrains Mono', monospace;
			font-size: 11px;
			color: var(--text-muted);
			cursor: pointer;
			user-select: none;
		}

		.follow-toggle input {
			accent-color: var(--power);
		}

		.route-inputs {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin: 10px 0;
		}

		.route-inputs input[type="text"] {
			flex: 1 1 160px;
			background: var(--surface-2);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text);
			padding: 9px 12px;
			font-family: 'Space Grotesk', sans-serif;
			font-size: 14px;
		}

		.route-inputs input[type="text"]:focus-visible {
			outline: 2px solid var(--speed);
			outline-offset: 1px;
		}

		.route-status {
			font-family: 'JetBrains Mono', monospace;
			font-size: 12px;
			color: var(--text-muted);
			margin-bottom: 10px;
		}

		#routeMap {
			height: 260px;
			border-radius: var(--radius);
			border: 1px solid var(--border);
			background: var(--surface);
			overflow: hidden;
		}

		.ride3d-section {
			margin-bottom: 20px;
		}

		#ride3dCanvas {
			height: 260px;
			border-radius: var(--radius);
			border: 1px solid var(--border);
			background: #0b0f14;
			overflow: hidden;
		}

		#ride3dCanvas canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		.session-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 14px 18px;
			margin-bottom: 32px;
		}

		.timer {
			font-family: 'JetBrains Mono', monospace;
			font-size: 20px;
			font-variant-numeric: tabular-nums;
			color: var(--text-muted);
		}

		.timer.active {
			color: var(--text);
		}

		.log-header {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			border-bottom: 1px solid var(--border);
			padding-bottom: 8px;
			margin-bottom: 4px;
		}

		.log-title {
			font-family: 'JetBrains Mono', monospace;
			font-size: 12px;
			letter-spacing: .18em;
			text-transform: uppercase;
			color: var(--text-muted);
		}

		.log-clear {
			background: none;
			border: none;
			padding: 0;
			font-family: 'Space Grotesk', sans-serif;
			font-size: 12px;
			color: var(--text-muted);
			text-decoration: underline;
			cursor: pointer;
		}

		.log-empty {
			padding: 28px 4px;
			color: var(--text-muted);
			font-size: 14px;
			text-align: center;
		}

		.log-row {
			display: grid;
			grid-template-columns:32px 1fr auto auto;
			gap: 12px;
			align-items: center;
			padding: 14px 4px;
			border-bottom: 1px solid var(--border);
		}

		.log-row:last-child {
			border-bottom: none;
		}

		.log-idx {
			font-family: 'JetBrains Mono', monospace;
			color: var(--text-muted);
			font-size: 13px;
		}

		.log-date {
			font-size: 14px;
		}

		.log-date .time {
			color: var(--text-muted);
			font-size: 12px;
			display: block;
			margin-top: 2px;
		}

		.log-route-badge {
			color: var(--speed);
			font-size: 11px;
			display: block;
			margin-top: 2px;
			font-family: 'JetBrains Mono', monospace;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 220px;
		}

		.log-stats {
			font-family: 'JetBrains Mono', monospace;
			font-size: 13px;
			text-align: right;
			color: var(--text-muted);
			white-space: nowrap;
		}

		.log-stats b {
			color: var(--text);
			font-weight: 600;
		}

		.log-share-btn {
			background: var(--surface-2);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text-muted);
			font-family: 'Space Grotesk', sans-serif;
			font-size: 12px;
			font-weight: 600;
			padding: 7px 10px;
			cursor: pointer;
			white-space: nowrap;
		}

		.log-share-btn:hover {
			color: var(--text);
			border-color: #3a4149;
		}

		.settings {
			display: none;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 16px;
			margin-bottom: 20px;
			font-size: 13px;
			color: var(--text-muted);
		}

		.settings.show {
			display: block;
		}

		.settings label {
			display: block;
			margin-bottom: 6px;
		}

		.settings input {
			background: var(--surface-2);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text);
			padding: 8px 10px;
			font-family: 'JetBrains Mono', monospace;
			width: 120px;
		}

		.debug-panel {
			display: none;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 14px 16px 4px;
			margin-bottom: 20px;
		}

		.debug-panel.show {
			display: block;
		}

		.debug-panel-head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 10px;
		}

		.debug-title {
			font-family: 'JetBrains Mono', monospace;
			font-size: 12px;
			letter-spacing: .18em;
			text-transform: uppercase;
			color: var(--text-muted);
		}

		.debug-head-actions {
			display: flex;
			gap: 14px;
		}

		.debug-action {
			background: none;
			border: none;
			padding: 0;
			font-family: 'Space Grotesk', sans-serif;
			font-size: 12px;
			color: var(--text-muted);
			text-decoration: underline;
			cursor: pointer;
		}

		.debug-list {
			max-height: 260px;
			overflow-y: auto;
			font-family: 'JetBrains Mono', monospace;
			font-size: 11px;
			line-height: 1.6;
		}

		.debug-row {
			display: grid;
			grid-template-columns:64px 130px 1fr;
			gap: 10px;
			padding: 6px 0;
			border-bottom: 1px solid var(--border);
		}

		.debug-row:last-child {
			border-bottom: none;
		}

		.debug-t {
			color: var(--text-muted);
		}

		.debug-src {
			color: var(--speed);
		}

		.debug-detail {
			grid-column: 1 / -1;
			color: var(--text-muted);
			padding-top: 2px;
		}

		.debug-detail b {
			color: var(--power);
			font-weight: 500;
		}

		.debug-empty {
			padding: 16px 4px;
			color: var(--text-muted);
			font-size: 13px;
			text-align: center;
			font-family: 'Space Grotesk', sans-serif;
		}

		@media (max-width: 420px) {
			.readouts {
				grid-template-columns:1fr;
			}

			.value.power {
				font-size: 38px;
			}

			.value.speed {
				font-size: 44px;
			}
		}
	</style>
</head>
<body>
<div class="wrap">

	<div class="account-bar" id="accountBar">
		<div class="account-info" id="accountInfo">
			<span class="account-avatar" id="accountAvatar"></span>
			<span class="account-name" id="accountName">Not signed in</span>
		</div>
		<button id="authBtn">Sign in with Google</button>
	</div>

	<header>
		<div class="brand">
			<span class="dot" id="statusDot"></span>
			<span id="statusText">disconnected</span>
		</div>
		<div class="actions">
			<button class="icon" id="debugBtn" title="Raw sensor data log" aria-label="Sensor log">▤</button>
			<button class="icon" id="settingsBtn" title="Wheel size settings" aria-label="Settings">⚙</button>
			<button id="connectBtn">Connect sensor</button>
		</div>
	</header>

	<div class="banner" id="unsupportedBanner">
		This browser doesn't support Web Bluetooth.
	</div>

	<div class="settings" id="settingsPanel">
		<label for="wheelCirc">Wheel circumference (mm) — only used if your sensor doesn't report speed directly</label>
		<input type="number" id="wheelCirc" value="2105" min="500" max="3000">
	</div>

	<div class="debug-panel" id="debugPanel">
		<div class="debug-panel-head">
			<span class="debug-title">Raw sensor data</span>
			<div class="debug-head-actions">
				<button class="debug-action" id="debugCopy">Copy</button>
				<button class="debug-action" id="debugClear">Clear</button>
			</div>
		</div>
		<div class="debug-list" id="debugList"></div>
	</div>

	<div class="readouts">
		<div class="card power-card">
			<div class="ring-wrap">
				<svg width="150" height="150" viewBox="0 0 150 150">
					<circle class="ring-bg" cx="75" cy="75" r="65"></circle>
					<circle class="ring-fg" id="powerRing" cx="75" cy="75" r="65"></circle>
				</svg>
				<div>
					<div class="value power" id="powerValue">–</div>
				</div>
			</div>
			<div class="unit">watts</div>
		</div>
		<div class="card speed-card">
			<div class="value speed" id="speedValue">–</div>
			<div class="unit">km/h</div>
		</div>
	</div>

	<div class="stats-grid">
		<div class="stat-tile">
			<div class="stat-value" id="cadenceValue">–</div>
			<div class="stat-label">Cadence rpm</div>
		</div>
		<div class="stat-tile">
			<div class="stat-value" id="distanceValue">–</div>
			<div class="stat-label">Distance km</div>
		</div>
		<div class="stat-tile">
			<div class="stat-value" id="resistanceValue">–</div>
			<div class="stat-label">Resistance</div>
		</div>
		<div class="stat-tile">
			<div class="stat-value" id="caloriesValue">–</div>
			<div class="stat-label">Kcal</div>
		</div>
		<div class="stat-tile">
			<div class="stat-value" id="elapsedValue">–</div>
			<div class="stat-label">Bike timer</div>
		</div>
	</div>

	<div class="ride3d-section">
		<div class="log-header">
			<span class="log-title">Ride view</span>
		</div>
		<div id="ride3dCanvas"></div>
	</div>

	<div class="session-bar">
		<button class="primary" id="rideBtn" disabled>Start ride</button>
		<div class="timer" id="timerDisplay">00:00</div>
	</div>

	<div class="route-section">
		<div class="log-header">
			<span class="log-title">Route</span>
			<label class="follow-toggle"><input type="checkbox" id="followToggle" checked> Follow</label>
		</div>
		<div class="route-inputs">
			<input type="text" id="routeFrom" placeholder="Start location">
			<input type="text" id="routeTo" placeholder="Destination">
			<button id="findRouteBtn">Find route</button>
		</div>
		<div class="route-status" id="routeStatus">Enter a start and destination to preview a route, then hit start ride to travel it.</div>
		<div id="routeMap"></div>
	</div>

	<div class="log-header">
		<span class="log-title">Ride log</span>
		<button class="log-clear" id="clearLog">Clear</button>
	</div>
	<div id="logList"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
<script>
	(function () {
		const POWER_SCALE_MAX = 400; // watts mapped to full ring
		const RING_CIRC = 2*Math.PI*65;

		const els = {
			statusDot: document.getElementById('statusDot'),
			statusText: document.getElementById('statusText'),
			connectBtn: document.getElementById('connectBtn'),
			settingsBtn: document.getElementById('settingsBtn'),
			settingsPanel: document.getElementById('settingsPanel'),
			wheelCirc: document.getElementById('wheelCirc'),
			debugBtn: document.getElementById('debugBtn'),
			debugPanel: document.getElementById('debugPanel'),

		async function syncFromCloud() {
			if(!fbDb || !currentUser) return;
			els.accountName.textContent = 'Syncing…';
			try {
				const snap = await ridesCollection(currentUser.uid).get();
				const cloudRides = snap.docs.map(d => d.data());
				const local = loadHistory();
				const byTs = new Map(local.map(r => [r.ts, r]));

				// Bring down anything the cloud has that we don't have locally yet.
				cloudRides.forEach(r => {
					if(!byTs.has(r.ts)) byTs.set(r.ts, r);
				});

				// Push up anything we have locally that the cloud doesn't have yet
				// (e.g. rides logged before you signed in).
				const cloudTsSet = new Set(cloudRides.map(r => r.ts));
				const toUpload = local.filter(r => !cloudTsSet.has(r.ts));
				await Promise.all(toUpload.map(r => pushRideToCloud(r)));

				const merged = Array.from(byTs.values());
				saveHistory(merged);
				renderHistory();
			} catch(e) {
				console.error('Cloud sync failed:', e);
			} finally {
				setAccountUI(currentUser);

		let routeActive = false;
		let followRider = true;
		let routeFromLabel = '', routeToLabel = '';

		function haversineKm(a, b) {
			const R = 6371;
			const dLat = (b.lat - a.lat)*Math.PI/180;
			const dLng = (b.lng - a.lng)*Math.PI/180;
			const la1 = a.lat*Math.PI/180, la2 = b.lat*Math.PI/180;
			const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
			return 2*R*Math.asin(Math.sqrt(h));
		}

		function downsampleCoords(coords, maxPoints) {
			if(coords.length <= maxPoints) return coords.slice();
			const step = coords.length/maxPoints;
			const out = [];
			for(let i = 0; i < maxPoints; i++) {
				out.push(coords[Math.floor(i*step)]);
			}
			out.push(coords[coords.length - 1]);
			return out;
		}

		function initMap() {
			if(map) return;

				attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'
			}).addTo(map);
			map.setView([52.2, 5.5], 6);
		}

		async function geocode(query) {
			const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
			if(!res.ok) throw new Error('Geocoding request failed');
			const data = await res.json();
			if(!data.length) throw new Error(`Location not found: "${query}"`);
			return {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), label: data[0].display_name};
		}

		async function findRoute() {
			const fromQ = els.routeFrom.value.trim();
			const toQ = els.routeTo.value.trim();
			if(!fromQ || !toQ) {
				els.routeStatus.textContent = 'Enter a start and destination.';
				return;
			}
			initMap();
			els.findRouteBtn.disabled = true;
			els.routeStatus.textContent = 'Looking up locations…';
			try {
				const [from, to] = await Promise.all([geocode(fromQ), geocode(toQ)]);

				els.routeStatus.textContent = 'Fetching route…';
				const url = `https://router.project-osrm.org/route/v1/bike/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
				const res = await fetch(url);
				if(!res.ok) throw new Error('Routing request failed');
				const data = await res.json();
				if(!data.routes || !data.routes.length) throw new Error('No cycling route found between those points.');

				const coords = data.routes[0].geometry.coordinates.map(c => ({lat: c[1], lng: c[0]}));
				routeCoords = coords;
				routeCumDist = [0];
				for(let i = 1; i < coords.length; i++) {
					routeCumDist.push(routeCumDist[i - 1] + haversineKm(coords[i - 1], coords[i]));
				}
				routeTotalKm = routeCumDist[routeCumDist.length - 1];
				routeActive = true;
				routeFromLabel = fromQ;
				routeToLabel = toQ;

				if(routeLayer) map.removeLayer(routeLayer);
				routeLayer = L.polyline(coords.map(c => [c.lat, c.lng]), {color: '#4dc8ff', weight: 4}).addTo(map);
				map.fitBounds(routeLayer.getBounds(), {padding: [24, 24]});

				if(riderMarker) map.removeLayer(riderMarker);
				riderMarker = L.circleMarker([coords[0].lat, coords[0].lng], {
					radius: 8, color: '#f4c430', weight: 2, fillColor: '#f4c430', fillOpacity: 1
				}).addTo(map);

				els.routeStatus.textContent = `Route ready — ${routeTotalKm.toFixed(1)} km. Start your ride to begin travelling it.`;
			} catch(err) {
				console.error(err);
				routeActive = false;
				els.routeStatus.textContent = 'Could not build route: ' + err.message;
			} finally {
				els.findRouteBtn.disabled = false;
			}
		}

		function updateRouteProgress(coveredKm) {
			if(!routeActive || routeCoords.length === 0) return;
			const clamped = Math.min(coveredKm, routeTotalKm);
			let i = 0;
			while(i < routeCumDist.length - 1 && routeCumDist[i + 1] < clamped) i++;
			const segStart = routeCumDist[i];
			const segEnd = routeCumDist[i + 1] !== undefined ? routeCumDist[i + 1] : segStart;
			const segLen = segEnd - segStart;
			const t = segLen > 0 ? (clamped - segStart)/segLen : 0;
			const a = routeCoords[i];
			const b = routeCoords[i + 1] || a;
			const lat = a.lat + (b.lat - a.lat)*t;
			const lng = a.lng + (b.lng - a.lng)*t;

			if(riderMarker) riderMarker.setLatLng([lat, lng]);
			if(followRider && map) map.panTo([lat, lng], {animate: true});

			const pct = routeTotalKm > 0 ? Math.min(100, (clamped/routeTotalKm)*100) : 0;
			els.routeStatus.textContent = clamped >= routeTotalKm
				? `Route complete — ${routeTotalKm.toFixed(1)} km! 🏁`
				: `${clamped.toFixed(2)} / ${routeTotalKm.toFixed(1)} km · ${pct.toFixed(0)}%`;
		}

			const mtGeom = new THREE.ConeGeometry(45, 30, 4);
			const mtMat = new THREE.MeshLambertMaterial({color: 0x677b8c});
			for(let m = 0; m < 4; m++) {
				const mt = new THREE.Mesh(mtGeom, mtMat);
				mt.position.set((m - 1.5)*90, -5, -280);
				mt.scale.set(1, 0.8 + Math.random()*0.5, 0.3);
				mountainGroup.add(mt);
			}
			scene.add(mountainGroup);

			// Base ground tracking mesh
			const baseGround = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), groundMat);
			baseGround.rotation.x = -Math.PI/2;
			baseGround.position.y = -0.15;
			scene.add(baseGround);

			// Recycled shared base meshes across segments to keep performance near 60 FPS
			const treeTrunkGeom = new THREE.CylinderGeometry(0.09, 0.16, 1.6, 5);
			const treeLeavesGeom = new THREE.ConeGeometry(1.1, 2.8, 6);
			const rockGeom = new THREE.DodecahedronGeometry(0.6, 0);
			const bushGeom = new THREE.SphereGeometry(0.7, 5, 4);
			const fenceRailGeom = new THREE.BoxGeometry(0.06, 0.12, SEG_LEN);
			const fencePostGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.1, 4);

			const segments = [];

			// Local procedural curve calculations to prevent matrix generation errors
          function getRoadLayout(worldZ) {
            // Curve/elevation disabled for now -- straight flat road while we
            // confirm the disappearing-road issue is unrelated to this.
            return {
              x: 0,
              y: 0
            };
          }
			// Populate localized tracking data structure array
			for(let i = 0; i < SEG_COUNT; i++) {
				const segmentGroup = new THREE.Group();

				// Structural Road Assembly
				const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, SEG_LEN), roadMat);
				road.rotation.x = -Math.PI/2;
				segmentGroup.add(road);

				// Shoulders Left/Right
				[-1, 1].forEach(side => {
					const shoulder = new THREE.Mesh(new THREE.PlaneGeometry(SHOULDER_WIDTH, SEG_LEN), shoulderMat);
					shoulder.rotation.x = -Math.PI/2;
					shoulder.position.set(side*(ROAD_WIDTH/2 + SHOULDER_WIDTH/2), -0.002, 0);

					const line = new THREE.Mesh(new THREE.PlaneGeometry(0.12, SEG_LEN), edgeLineMat);
					line.rotation.x = -Math.PI/2;
					line.position.set(side*(ROAD_WIDTH/2), 0.002, 0);

					segmentGroup.add(shoulder, line);
				});

				// Continuous Center Dashes
				const stripe = new THREE.Mesh(new THREE.PlaneGeometry(0.16, SEG_LEN*0.4), stripeMat);
				stripe.rotation.x = -Math.PI/2;
				stripe.position.set(0, 0.005, 0);
				segmentGroup.add(stripe);

				// Scenery wrapper group container to handle instant isolated recycling calls
				const sceneryGroup = new THREE.Group();
				segmentGroup.add(sceneryGroup);

				const baseZ = -i*SEG_LEN;
              console.log(
                      "Road segment created",
                      i,
                      "z=",
                      baseZ
              );

				segmentGroup.position.z = baseZ;

				const layout = getRoadLayout(baseZ);
				segmentGroup.position.x = layout.x;
				segmentGroup.position.y = layout.y;

				scene.add(segmentGroup);

				const segData = {
					group: segmentGroup,
					scenery: sceneryGroup,
					initialZ: baseZ
				};

				populateScenery(segData.scenery, baseZ);
				segments.push(segData);
			}

			function populateScenery(group, worldZ) {
				// Clear out previous tracking instances
				while(group.children.length > 0) {
					group.remove(group.children[0]);
				}

				const seed = Math.abs(Math.sin(worldZ));
				const leftSideActive = (seed*10)%2 > 0.7;
				const rightSideActive = (seed*100)%2 > 0.7;

				[-1, 1].forEach(side => {
					const sideActive = side === -1 ? leftSideActive : rightSideActive;
					const sideSeed = side === -1 ? seed : (seed*5)%1;
					const lateralOffset = side*(TOTAL_SURFACE_WIDTH/2 + 1.2);

					if(sideActive) {
						// Forest Generation Logic
						const treeCount = 1 + Math.floor(sideSeed*3);
						for(let t = 0; t < treeCount; t++) {
							const tree = new THREE.Group();
							const trunk = new THREE.Mesh(treeTrunkGeom, trunkMat);
							trunk.position.y = 0.8;

							const matIndex = Math.floor(((sideSeed*10) + t)%leavesMaterials.length);
							const leaves = new THREE.Mesh(treeLeavesGeom, leavesMaterials[matIndex]);
							leaves.position.y = 2.4;

							tree.add(trunk, leaves);

							// Random variation variables
							const scaleY = 0.85 + (sideSeed*0.5);
							const scaleXZ = 0.8 + (((sideSeed*3) + t)%1)*0.4;
							tree.scale.set(scaleXZ, scaleY, scaleXZ);

							const localX = lateralOffset + (side*(t*2.2 + (sideSeed*1.5)));
							const localZ = -SEG_LEN/2 + (((sideSeed*7) + t)%1)*SEG_LEN;
							tree.position.set(localX, 0, localZ);
							group.add(tree);
						}
					} else {
						// Alternative element populating configuration (Rocks, Fences, Grass, Bushes)
						const variantType = Math.floor(sideSeed*4);
						const localZPoint = -SEG_LEN/2 + (sideSeed*SEG_LEN);

						if(variantType === 0) { // Rock Group
							const rock = new THREE.Mesh(rockGeom, rockMat);
							rock.position.set(lateralOffset + (side*0.8), 0.2, localZPoint);
							rock.rotation.set(sideSeed, sideSeed*2, 0);
							rock.scale.set(0.7 + sideSeed, 0.7 + sideSeed, 0.7 + sideSeed);
							group.add(rock);
						} else if(variantType === 1) { // Dense Bush Structures
							const bush = new THREE.Mesh(bushGeom, bushMat);
							bush.position.set(lateralOffset + (side*0.5), 0.3, localZPoint);
							bush.scale.set(1.2 + sideSeed*0.6, 0.7 + sideSeed*0.5, 1 + sideSeed*0.5);
							group.add(bush);
						} else if(variantType === 2) { // Modular Fence Sections
							const fence = new THREE.Group();
							const post1 = new THREE.Mesh(fencePostGeom, fenceMat);
							post1.position.set(lateralOffset, 0.55, -SEG_LEN/2);
							const post2 = new THREE.Mesh(fencePostGeom, fenceMat);
							post2.position.set(lateralOffset, 0.55, SEG_LEN/2);

							const rail1 = new THREE.Mesh(fenceRailGeom, fenceMat);
							rail1.position.set(lateralOffset, 0.75, 0);
							const rail2 = new THREE.Mesh(fenceRailGeom, fenceMat);
							rail2.position.set(lateralOffset, 0.40, 0);

							fence.add(post1, post2, rail1, rail2);
							group.add(fence);
						}
					}
				});
			}

			function resize() {
				const w = container.clientWidth, h = container.clientHeight;
				if(!w || !h) return;
				camera.aspect = w/h;
				camera.updateProjectionMatrix();
				renderer.setSize(w, h);
			}

			window.addEventListener('resize', resize);

			const clock = new THREE.Clock();
			let lastDiagLog = 0;

			function animate() {
				requestAnimationFrame(animate);
				const dt = Math.min(clock.getDelta(), 0.1);
				const speedKmh = lastSpeed || 0;
				const speedMS = (speedKmh*1000)/3600;
				const visualSpeed = speedMS*VISUAL_SCALE;
				currentWorldProgress += visualSpeed*dt;
				// Adjust environment atmosphere instantly to project extreme speed levels
				const speedRatio = Math.min(speedKmh/50, 1.5); // Normalized scalar up to 75kmh
				currentFog.near = baseFogNear - (speedRatio*12);
				currentFog.far = baseFogFar - (speedRatio*45);
				camera.fov = BASE_FOV + (speedRatio*16); // Dynamic FOV zoom out
				camera.updateProjectionMatrix();
				// Reposition mountain horizons softly against relative camera pathing
				mountainGroup.position.x = -camera.position.x*0.85;

				// TEMP DIAGNOSTIC: once a second, print enough state to actually see what's
				// happening if the road still appears to vanish. Remove once resolved.
				if (performance.now() - lastDiagLog > 1000){
					lastDiagLog = performance.now();
					console.log('[3D diag]', {
						speedKmh: speedKmh.toFixed(1),
						visualSpeed: visualSpeed.toFixed(2),
						worldProgress: currentWorldProgress.toFixed(1),
						fogNear: currentFog.near.toFixed(1),
						fogFar: currentFog.far.toFixed(1),
						fov: camera.fov.toFixed(1),
						segZRange: [Math.min(...segments.map(s=>s.group.position.z)).toFixed(1),
									Math.max(...segments.map(s=>s.group.position.z)).toFixed(1)],
						camPos: [camera.position.x.toFixed(2), camera.position.y.toFixed(2), camera.position.z.toFixed(2)]
					});
				}


				// Each segment scrolls toward the camera every frame. Its "true" position
				// along the infinite procedural path is (local z) - (total distance travelled),
				// which stays stable forever since both grow by the same amount each frame --
				// no loop-counting needed, and it doubles as a stable seed for curve/elevation.
				segments.forEach(seg => {
					seg.group.position.z += visualSpeed*dt;

					const worldZ = seg.group.position.z - currentWorldProgress;
					const layout = getRoadLayout(worldZ);
					seg.group.position.x = layout.x;
					seg.group.position.y = layout.y;

					if(seg.group.position.z > 20) {
						seg.group.position.z -= totalLen;
						const recycledWorldZ = seg.group.position.z - currentWorldProgress;
						populateScenery(seg.scenery, recycledWorldZ);
					}
				});


				// Straight road for now, so the camera just stays centered -- only a
				// small vertical bob for pedalling feel, no sideways movement at all.
				if(visualSpeed > 0.05) {
					ride3dBobPhase += dt*(3.5 + visualSpeed*0.8); // micro-vibrations + pedalling rhythm
					const bobValue = Math.sin(ride3dBobPhase)*(0.022 + speedRatio*0.01);
					const microVibration = (Math.random() - 0.5)*(speedRatio*0.009);
					camera.position.y = BASE_CAM_Y + bobValue + microVibration;
					camera.position.x = 0;
					camera.rotation.z = 0;
					camera.lookAt(0, BASE_CAM_Y*0.8, -18);
				}


				else { // Return smoothly to standard idle positions when wheel stop tracking kicks in
					camera.position.set(0, BASE_CAM_Y, 8);
					camera.rotation.z = 0;
					camera.lookAt(0, BASE_CAM_Y*0.8, -18);
				}
				renderer.render(scene, camera);
			}

			animate();
		}


		init3D();

		// ---------- FTMS indoor bike data (0x2AD2) ----------
		function handleIndoorBikeData(event) {
			const dv = event.target.value;
			let offset = 0;
			const flags = dv.getUint16(offset, true);
			offset += 2;
			const moreData = flags & 0x1;
			const avgSpeedP = flags & 0x2;
			const instCadP = flags & 0x4;
			const avgCadP = flags & 0x8;
			const totalDistP = flags & 0x10;
			const resistP = flags & 0x20;
			const instPowerP = flags & 0x40;
			const avgPowerP = flags & 0x80;
			const expEnergyP = flags & 0x100;
			const hrP = flags & 0x200;
			const metP = flags & 0x400;
			const elapsedP = flags & 0x800;
			const remainP = flags & 0x1000;

			const parts = [`flags=0x${flags.toString(16).padStart(4, '0')}`];

			if(!moreData) {
				const speed = dv.getUint16(offset, true)*0.01;
				offset += 2;
				updateSpeed(speed);
				parts.push(`speed=<b>${speed.toFixed(2)} km/h</b>`);
			} else {
				parts.push('speed n/a this packet');
			}
			if(avgSpeedP) {
				const avgSpeed = dv.getUint16(offset, true)*0.01;
				offset += 2;
				parts.push(`avgSpeed=${avgSpeed.toFixed(2)} km/h`);
			}
			if(instCadP) {
				const cadence = dv.getUint16(offset, true)*0.5;
				offset += 2;
				updateCadence(cadence);
				parts.push(`cadence=<b>${cadence} rpm</b>`);
			}
			if(avgCadP) {
				const avgCadence = dv.getUint16(offset, true)*0.5;
				offset += 2;
				parts.push(`avgCadence=${avgCadence} rpm`);
			}
			if(totalDistP) {
				const distanceM = dv.getUint8(offset) | (dv.getUint8(offset + 1)<<8) | (dv.getUint8(offset + 2)<<16);
				offset += 3;
				updateBikeDistance(distanceM);
				parts.push(`distance=<b>${(distanceM/1000).toFixed(2)} km</b>`);
			}
			if(resistP) {
				const resistance = dv.getInt16(offset, true);
				offset += 2;
				updateResistance(resistance);
				parts.push(`resistance=${resistance}`);
			}
			if(instPowerP) {
				const power = dv.getInt16(offset, true);
				offset += 2;
				updatePower(power);
				parts.push(`power=<b>${power} W</b>`);
			} else {
				parts.push('power n/a this packet');
			}
			if(avgPowerP) {
				const avgPower = dv.getInt16(offset, true);
				offset += 2;
				parts.push(`avgPower=${avgPower} W`);
			}
			if(expEnergyP) {
				const totalEnergy = dv.getUint16(offset, true);
				offset += 2;
				const energyPerHour = dv.getUint16(offset, true);
				offset += 2;
				let energyPerMin = null;
				if(offset < dv.byteLength) {
					energyPerMin = dv.getUint8(offset);
					offset += 1;
				}
				updateCalories(totalEnergy);
				parts.push(`calories=<b>${totalEnergy} kcal</b> (${energyPerHour}/hr)`);
			}
			if(hrP && offset < dv.byteLength) {
				const hr = dv.getUint8(offset);
				offset += 1;
				parts.push(`heartRate=${hr} bpm`);
			}
			if(metP && offset < dv.byteLength) {
				const met = dv.getUint8(offset);
				offset += 1;
				parts.push(`met=${met}`);
			}
			if(elapsedP && offset + 1 < dv.byteLength) {
				const elapsed = dv.getUint16(offset, true);
				offset += 2;
				updateBikeElapsed(elapsed);
				parts.push(`bikeElapsed=<b>${fmtDuration(elapsed)}</b>`);
			}
			if(remainP && offset + 1 < dv.byteLength) {
				const remaining = dv.getUint16(offset, true);
				offset += 2;
				parts.push(`remaining=${fmtDuration(remaining)}`);
			}
			logPacket('indoor_bike_data', dv, parts.join(' · '));
		}

		// ---------- Cycling Power Measurement (0x2A63) ----------
		function handlePowerMeasurement(event) {
			const dv = event.target.value;
			const flags = dv.getUint16(0, true);
			const power = dv.getInt16(2, true); // instantaneous power always follows the 2-byte flags field
			updatePower(power);
			logPacket('cycling_power_measurement', dv,
				`flags=0x${flags.toString(16).padStart(4, '0')} · power=<b>${power} W</b>` +
				(dv.byteLength > 4 ? ` · +${dv.byteLength - 4} extra bytes (torque/wheel/crank data, unused)` : ''));
		}

		// ---------- CSC Measurement (0x2A5B) for speed fallback ----------
		function handleCSCMeasurement(event) {
			const dv = event.target.value;
			let offset = 0;
			const flags = dv.getUint8(offset);
			offset += 1;
			const wheelPresent = flags & 0x1;
			const crankPresent = flags & 0x2;
			if(!wheelPresent) {
				logPacket('csc_measurement', dv, `flags=0x${flags.toString(16).padStart(2, '0')} · no wheel revolution data in this packet`);
				return;
			}

			const cumRevs = dv.getUint32(offset, true);
			offset += 4;
			const eventTime = dv.getUint16(offset, true);
			offset += 2; // units of 1/1024s

			let summary = `flags=0x${flags.toString(16).padStart(2, '0')} · wheelRevs=${cumRevs} · eventTime=${eventTime}`;
			if(crankPresent) summary += ' · crank data present (unused)';

			if(prevWheelRevs !== null) {
				let deltaRevs = cumRevs - prevWheelRevs;
				if(deltaRevs < 0) deltaRevs += 0x100000000;
				let deltaTime = eventTime - prevWheelEventTime;
				if(deltaTime < 0) deltaTime += 0x10000;
				if(deltaTime > 0) {
					const deltaTimeS = deltaTime/1024;
					const circM = (parseFloat(els.wheelCirc.value) || 2105)/1000;
					const distM = deltaRevs*circM;
					const speed = (distM/deltaTimeS)*3.6;
					updateSpeed(speed);
					summary += ` · speed=<b>${speed.toFixed(2)} km/h</b>`;
				} else {
					summary += ' · no new wheel event (coasting/stopped)';
				}
			} else {
				summary += ' · first reading, no delta yet';
			}
			prevWheelRevs = cumRevs;
			prevWheelEventTime = eventTime;
			logPacket('csc_measurement', dv, summary);
		}

		// ---------- connection ----------
		function onDisconnected() {
			setStatus('disconnected', 'disconnected');
			els.connectBtn.textContent = 'Connect sensor';
			els.rideBtn.disabled = true;
			if(isRiding) stopRide();
		}

		// Bluefy (and some other non-Chrome Web Bluetooth implementations) don't resolve the
		// human-readable short names Chrome accepts (e.g. 'fitness_machine'). Explicit
		// Bluetooth SIG UUIDs work identically everywhere, so we use those instead.
		const UUID = {
			fitnessMachine: '00001826-0000-1000-8000-00805f9b34fb',
			indoorBikeData: '00002ad2-0000-1000-8000-00805f9b34fb',
			cyclingPower: '00001818-0000-1000-8000-00805f9b34fb',
			cyclingPowerMeasurement: '00002a63-0000-1000-8000-00805f9b34fb',
			cyclingSpeedCadence: '00001816-0000-1000-8000-00805f9b34fb',
			cscMeasurement: '00002a5b-0000-1000-8000-00805f9b34fb',
			deviceInformation: '0000180a-0000-1000-8000-00805f9b34fb',
		};

		async function connect() {
			try {
				setStatus('connecting', 'connecting…');
				device = await navigator.bluetooth.requestDevice({
					filters: [
						{services: [UUID.fitnessMachine]},
						{services: [UUID.cyclingPower]},
						{services: [UUID.cyclingSpeedCadence]},
					],
					optionalServices: [UUID.fitnessMachine, UUID.cyclingPower, UUID.cyclingSpeedCadence, UUID.deviceInformation]
				});
				device.addEventListener('gattserverdisconnected', onDisconnected);
				logEvent('connect', `device picked: <b>${device.name || '(unnamed)'}</b>, id=${device.id}`);
				server = await device.gatt.connect();

				const allServices = await server.getPrimaryServices();
				logEvent('connect', `advertised services: ${allServices.map(s => s.uuid).join(', ') || 'none found'}`);

				usingFTMS = false;
				try {
					const ftms = await server.getPrimaryService(UUID.fitnessMachine);
					const indoorBike = await ftms.getCharacteristic(UUID.indoorBikeData);
					await indoorBike.startNotifications();
					indoorBike.addEventListener('characteristicvaluechanged', handleIndoorBikeData);
					usingFTMS = true;
					logEvent('connect', 'using <b>fitness_machine</b> service — indoor_bike_data notifications started');
				} catch(e) {
					logEvent('connect', 'no fitness_machine (FTMS) service found');
				}

				if(!usingFTMS) {
					let gotPower = false, gotSpeed = false;
					try {
						const cps = await server.getPrimaryService(UUID.cyclingPower);
						const powerChar = await cps.getCharacteristic(UUID.cyclingPowerMeasurement);
						await powerChar.startNotifications();
						powerChar.addEventListener('characteristicvaluechanged', handlePowerMeasurement);
						gotPower = true;
						logEvent('connect', 'using <b>cycling_power</b> service — power notifications started');
					} catch(e) {
						logEvent('connect', 'no cycling_power service found');
					}
					try {
						const csc = await server.getPrimaryService(UUID.cyclingSpeedCadence);
						const cscChar = await csc.getCharacteristic(UUID.cscMeasurement);
						await cscChar.startNotifications();
						cscChar.addEventListener('characteristicvaluechanged', handleCSCMeasurement);
						gotSpeed = true;
						logEvent('connect', 'using <b>cycling_speed_and_cadence</b> service — CSC notifications started');
					} catch(e) {
						logEvent('connect', 'no cycling_speed_and_cadence service found');
					}

					if(!gotPower && !gotSpeed) {
						throw new Error('No supported cycling services found on this device.');
					}
				}

				setStatus('connected', device.name || 'connected');
				els.connectBtn.textContent = 'Disconnect';
				els.rideBtn.disabled = false;
			} catch(err) {
				console.error(err);
				setStatus('disconnected', 'disconnected');
				els.connectBtn.textContent = 'Connect sensor';
				if(err.name !== 'NotFoundError') {
					alert('Couldn\'t connect: ' + err.message);
				}
			}
		}

		els.connectBtn.addEventListener('click', () => {
			if(device && device.gatt.connected) {
				device.gatt.disconnect();
			} else {
				connect();
			}
		});

		// ---------- share ride as an image (Instagram Story sized) ----------
		async function buildShareCanvas(entry) {
			if(document.fonts && document.fonts.ready) {
				try {
					await document.fonts.ready;
				} catch(e) {
				}
			}
			const W = 1080, H = 1920;
			const canvas = document.createElement('canvas');
			canvas.width = W;
			canvas.height = H;
			const ctx = canvas.getContext('2d');

			const bg = ctx.createLinearGradient(0, 0, 0, H);
			bg.addColorStop(0, '#171b1f');
			bg.addColorStop(1, '#101316');
			ctx.fillStyle = bg;
			ctx.fillRect(0, 0, W, H);

			const glowA = ctx.createRadialGradient(W*0.15, H*0.04, 0, W*0.15, H*0.04, W*0.65);
			glowA.addColorStop(0, 'rgba(244,196,48,0.10)');
			glowA.addColorStop(1, 'rgba(244,196,48,0)');
			ctx.fillStyle = glowA;
			ctx.fillRect(0, 0, W, H);

			const glowB = ctx.createRadialGradient(W*0.92, H*0.02, 0, W*0.92, H*0.02, W*0.55);
			glowB.addColorStop(0, 'rgba(77,200,255,0.09)');
			glowB.addColorStop(1, 'rgba(77,200,255,0)');
			ctx.fillStyle = glowB;
			ctx.fillRect(0, 0, W, H);

			ctx.textBaseline = 'alphabetic';
			ctx.fillStyle = '#7c848c';
			ctx.font = '600 30px "Space Grotesk", sans-serif';
			ctx.fillText('CADENCE LOG', 70, 110);

			const d = new Date(entry.ts);
			ctx.fillStyle = '#ecedef';
			ctx.font = '500 30px "Space Grotesk", sans-serif';
			ctx.fillText(d.toLocaleDateString(undefined, {month: 'long', day: 'numeric', year: 'numeric'}), 70, 152);

			const shownKm = entry.routeCoveredKm != null ? entry.routeCoveredKm : entry.distanceKm;
			ctx.fillStyle = '#4dc8ff';
			ctx.font = '700 170px "JetBrains Mono", monospace';
			ctx.fillText(shownKm.toFixed(1), 70, 420);
			ctx.fillStyle = '#7c848c';
			ctx.font = '600 40px "Space Grotesk", sans-serif';
			ctx.fillText('KILOMETERS', 74, 470);

			function statBlock(x, y, label, value, color) {
				ctx.fillStyle = color;
				ctx.font = '700 66px "JetBrains Mono", monospace';
				ctx.fillText(value, x, y);
				ctx.fillStyle = '#7c848c';
				ctx.font = '600 25px "Space Grotesk", sans-serif';
				ctx.fillText(label, x, y + 38);
			}

			statBlock(70, 630, 'AVG POWER (W)', String(entry.avgPower), '#f4c430');
			statBlock(560, 630, 'MAX POWER (W)', String(entry.maxPower), '#f4c430');
			statBlock(70, 770, 'DURATION', fmtDuration(entry.duration), '#ecedef');
			statBlock(560, 770, 'CALORIES', entry.caloriesKcal != null ? String(entry.caloriesKcal) : '—', '#ecedef');

			if(entry.routeCoords && entry.routeCoords.length > 1) {
				let y = 930;
				ctx.fillStyle = '#7c848c';
				ctx.font = '600 26px "Space Grotesk", sans-serif';
				ctx.fillText('ROUTE', 70, y);

				const boxX = 70, boxY = y + 30, boxW = W - 140, boxH = 460, pad = 36;
				const lats = entry.routeCoords.map(c => c.lat);
				const lngs = entry.routeCoords.map(c => c.lng);
				const minLat = Math.min(...lats), maxLat = Math.max(...lats);
				const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
				const meanLat = (minLat + maxLat)/2*Math.PI/180;
				const spanLat = Math.max(maxLat - minLat, 1e-6);
				const spanLng = Math.max(maxLng - minLng, 1e-6);
				const scale = Math.min(
					(boxW - pad*2)/(spanLng*Math.cos(meanLat)),
					(boxH - pad*2)/spanLat
				);
				const usedW = spanLng*Math.cos(meanLat)*scale;
				const usedH = spanLat*scale;
				const offX = boxX + pad + (boxW - pad*2 - usedW)/2;
				const offY = boxY + pad + (boxH - pad*2 - usedH)/2;
				const proj = c => [
					offX + (c.lng - minLng)*Math.cos(meanLat)*scale,
					offY + (maxLat - c.lat)*scale
				];

				ctx.strokeStyle = '#4dc8ff';
				ctx.lineWidth = 7;
				ctx.lineJoin = 'round';
				ctx.lineCap = 'round';
				ctx.beginPath();
				entry.routeCoords.forEach((c, i) => {
					const [x, py] = proj(c);
					if(i === 0) ctx.moveTo(x, py); else ctx.lineTo(x, py);
				});
				ctx.stroke();

				const [sx, sy] = proj(entry.routeCoords[0]);
				const [ex, ey] = proj(entry.routeCoords[entry.routeCoords.length - 1]);
				ctx.fillStyle = '#f4c430';
				ctx.beginPath();
				ctx.arc(sx, sy, 11, 0, Math.PI*2);
				ctx.fill();
				ctx.fillStyle = '#ecedef';
				ctx.beginPath();
				ctx.arc(ex, ey, 11, 0, Math.PI*2);
				ctx.fill();

				ctx.fillStyle = '#ecedef';
				ctx.font = '500 30px "Space Grotesk", sans-serif';
				let routeLabel = `${entry.routeFrom} → ${entry.routeTo}`;
				if(routeLabel.length > 44) routeLabel = routeLabel.slice(0, 42) + '…';
				ctx.fillText(routeLabel, 70, boxY + boxH + 50);
				ctx.fillStyle = '#7c848c';
				ctx.font = '500 24px "JetBrains Mono", monospace';
				ctx.fillText(`${entry.routeTotalKm.toFixed(1)} km route`, 70, boxY + boxH + 84);
			}

			ctx.fillStyle = '#4a5158';
			ctx.font = '500 24px "JetBrains Mono", monospace';
			ctx.fillText('cadence-log', 70, H - 60);

			return canvas;
		}

		async function shareRide(entry, triggerBtn) {
			const originalLabel = triggerBtn ? triggerBtn.textContent : null;
			if(triggerBtn) {
				triggerBtn.textContent = '…';
				triggerBtn.disabled = true;
			}
			try {
				const canvas = await buildShareCanvas(entry);
				const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
				if(!blob) throw new Error('Could not render image');
				const file = new File([blob], `ride-${entry.ts}.png`, {type: 'image/png'});

				if(navigator.canShare && navigator.canShare({files: [file]})) {
					await navigator.share({
						files: [file],
						title: 'My ride',
						text: `${(entry.routeCoveredKm ?? entry.distanceKm).toFixed(1)} km ride — ${entry.avgPower}W avg`
					});
				} else {
					const url = URL.createObjectURL(blob);
					const a = document.createElement('a');
					a.href = url;
					a.download = `ride-${entry.ts}.png`;
					document.body.appendChild(a);
					a.click();
					a.remove();
					setTimeout(() => URL.revokeObjectURL(url), 5000);
					alert('Image saved — open Instagram and add it to your story from there.');
				}
			} catch(err) {
				if(err.name !== 'AbortError') {
					console.error(err);
					alert('Could not create the share image: ' + err.message);
				}
			} finally {
				if(triggerBtn) {
					triggerBtn.textContent = originalLabel;
					triggerBtn.disabled = false;
				}
			}
		}

		// ---------- ride session ----------
		function startRide() {
			isRiding = true;
			rideStartTs = Date.now();
			powerSum = 0;
			powerCount = 0;
			powerMax = 0;
			distanceKm = 0;
			lastSpeedTs = performance.now();
			if(routeActive) updateRouteProgress(0);
			els.rideBtn.textContent = 'Stop ride';
			els.rideBtn.classList.add('stop');
			els.rideBtn.classList.remove('primary');
			els.timerDisplay.classList.add('active');
			timerInterval = setInterval(() => {
				const sec = Math.floor((Date.now() - rideStartTs)/1000);
				els.timerDisplay.textContent = fmtDuration(sec);
			}, 1000);
		}

		function stopRide() {
			isRiding = false;
			clearInterval(timerInterval);
			const duration = Math.floor((Date.now() - rideStartTs)/1000);
			els.rideBtn.textContent = 'Start ride';
			els.rideBtn.classList.remove('stop');
			els.rideBtn.classList.add('primary');
			els.timerDisplay.classList.remove('active');

			if(duration >= 5) {
				const caloriesText = els.caloriesValue.textContent;
				const entry = {
					ts: rideStartTs,
					duration,
					avgPower: powerCount ? Math.round(powerSum/powerCount) : 0,
					maxPower: Math.round(powerMax),
					distanceKm: distanceKm,
					caloriesKcal: caloriesText && caloriesText !== '–' ? Number(caloriesText) : null,
				};
				if(routeActive) {
					entry.routeFrom = routeFromLabel;
					entry.routeTo = routeToLabel;
					entry.routeTotalKm = routeTotalKm;
					entry.routeCoveredKm = Math.min(distanceKm, routeTotalKm);
					entry.routeCoords = downsampleCoords(routeCoords, 80);
				}
				const list = loadHistory();
				list.push(entry);
				saveHistory(list);
				renderHistory();
				if(currentUser) pushRideToCloud(entry);
			}
			els.timerDisplay.textContent = '00:00';
		}

		els.rideBtn.addEventListener('click', () => {
			if(isRiding) stopRide(); else startRide();
		});

	})();
</script>
